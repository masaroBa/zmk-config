on: [push, pull_request, workflow_dispatch]

name: Build

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          # 先頭に v2- を付けてキャッシュを新しくし、パスを config/west.yml に修正しました
          key: v2-${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            v2-${{ runner.os }}-build-${{ env.cache-name }}-
            v2-${{ runner.os }}-build-
            v2-${{ runner.os }}-
      - name: West Init
        run: west init -l config
      - name: West Update
        run: west update
      - name: West Zephyr export
        run: west zephyr-export

      # ここから下が roba 専用の設定（左右別々のビルド）です
      - name: West Build Left (roba)
        run: west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=roba_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename Left uf2
        run: cp build/zephyr/zmk.uf2 roba_left.uf2

      - name: West Build Right (roba)
        run: west build -p -s zmk/app -b nice_nano_v2 -- -DSHIELD=roba_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename Right uf2
        run: cp build/zephyr/zmk.uf2 roba_right.uf2

      - name: Archive (roba)
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "*.uf2"
